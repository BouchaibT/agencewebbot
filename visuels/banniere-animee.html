<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WebBot Maroc — Bannière animée</title>
<style>
  :root{
    --violet-dark:#2d1b69;
    --violet-mid:#4c1d95;
    --violet-light:#a78bfa;
    --white:#ffffff;
    --wa-green:#25d366;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:820px;height:312px;overflow:hidden}
  body{font-family:'Segoe UI',Arial,sans-serif}

  .banner{
    position:relative;
    width:820px;height:312px;
    background:linear-gradient(135deg,var(--violet-dark),var(--violet-mid));
    overflow:hidden;
    display:flex;align-items:center;
  }

  /* ---------- Particules ---------- */
  .particle{
    position:absolute;
    bottom:-20px;
    border-radius:50%;
    background:var(--violet-light);
    opacity:.35;
    animation:floatUp linear infinite;
    pointer-events:none;
  }
  .particle.green{background:var(--wa-green)}
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:.45; }
    90%{ opacity:.25; }
    100%{ transform:translateY(-360px) translateX(var(--drift,20px)); opacity:0; }
  }

  /* ---------- Robot ---------- */
  .robot-wrap{
    position:relative;
    flex:0 0 230px;
    display:flex;align-items:center;justify-content:center;
    height:100%;
  }
  .robot{
    position:relative;
    animation:floatRobot 3.4s ease-in-out infinite;
  }
  @keyframes floatRobot{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-14px); }
  }
  .robot svg{ display:block; filter:drop-shadow(0 14px 26px rgba(0,0,0,.35)); }

  .eye{
    transform-origin:center;
    animation:blink 3s infinite;
  }
  .eye.right{ animation-delay:0s; }
  @keyframes blink{
    0%, 92%, 100% { transform:scaleY(1); }
    96% { transform:scaleY(0.12); }
  }

  /* ---------- Bulle WhatsApp ---------- */
  .wa-bubble{
    position:absolute;
    top:18px; right:6px;
    width:54px;height:54px;border-radius:50%;
    background:var(--wa-green);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(37,211,102,.55);
    animation:waPulse 2.2s ease-in-out infinite;
  }
  .wa-bubble svg{ width:28px;height:28px;fill:var(--white) }
  @keyframes waPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.18); }
  }

  /* ---------- Texte ---------- */
  .text-wrap{
    flex:1;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 36px 0 6px;
    height:100%;
  }
  .brand{
    font-size:54px;font-weight:800;letter-spacing:1px;
    white-space:nowrap;
    display:flex;
  }
  .brand .typed-1{
    color:var(--white);
    overflow:hidden;
    white-space:nowrap;
    width:0;
    border-right:4px solid var(--white);
    animation:
      typeWebBot 1.1s steps(6) forwards,
      caretMove1 1.1s steps(6) forwards;
  }
  .brand .typed-2{
    color:var(--violet-light);
    overflow:hidden;
    white-space:nowrap;
    width:0;
    margin-left:14px;
    border-right:4px solid var(--violet-light);
    opacity:0;
    animation:
      revealMaroc 0s 1.25s forwards,
      typeMaroc 0.9s steps(5) 1.25s forwards,
      caretMove2 0.9s steps(5) 1.25s forwards,
      hideCaret 0s 2.2s forwards;
  }
  @keyframes typeWebBot{
    from{ width:0; }
    to{ width:9ch; }
  }
  @keyframes caretMove1{
    99%{ border-right-color:var(--white); }
    100%{ border-right-color:transparent; }
  }
  @keyframes revealMaroc{
    to{ opacity:1; }
  }
  @keyframes typeMaroc{
    from{ width:0; }
    to{ width:7ch; }
  }
  @keyframes caretMove2{
    99%{ border-right-color:var(--violet-light); }
    100%{ border-right-color:transparent; }
  }
  @keyframes hideCaret{
    to{ border-right-color:transparent; }
  }

  .slogan{
    margin-top:14px;
    font-size:19px;
    font-weight:600;
    color:var(--white);
    opacity:0;
    max-width:430px;
    line-height:1.4;
    transform:translateX(140px);
    animation:slideIn 0.9s 2.35s cubic-bezier(.22,1,.36,1) forwards;
  }
  .slogan span{ color:var(--wa-green) }
  @keyframes slideIn{
    from{ opacity:0; transform:translateX(140px); }
    to{ opacity:1; transform:translateX(0); }
  }
</style>
</head>
<body>
  <div class="banner" id="banner">

    <div class="robot-wrap">
      <div class="robot">
        <svg width="160" height="190" viewBox="0 0 160 190" xmlns="http://www.w3.org/2000/svg">
          <!-- antenna -->
          <line x1="80" y1="10" x2="80" y2="34" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
          <circle cx="80" cy="8" r="8" fill="#a78bfa"/>
          <!-- head -->
          <rect x="22" y="34" width="116" height="100" rx="32" fill="#ffffff"/>
          <rect x="22" y="34" width="116" height="100" rx="32" fill="url(#headGrad)" opacity="0.18"/>
          <!-- eyes -->
          <circle class="eye left" cx="62" cy="84" r="13" fill="#2d1b69"/>
          <circle class="eye right" cx="98" cy="84" r="13" fill="#2d1b69"/>
          <circle cx="66" cy="80" r="4" fill="#ffffff" opacity=".8"/>
          <circle cx="102" cy="80" r="4" fill="#ffffff" opacity=".8"/>
          <!-- smile -->
          <path d="M 64 110 Q 80 122 96 110" stroke="#2d1b69" stroke-width="5" fill="none" stroke-linecap="round"/>
          <!-- ears -->
          <rect x="8" y="68" width="14" height="34" rx="7" fill="#a78bfa"/>
          <rect x="138" y="68" width="14" height="34" rx="7" fill="#a78bfa"/>
          <!-- body -->
          <rect x="42" y="140" width="76" height="46" rx="20" fill="#ffffff" opacity=".92"/>
          <circle cx="80" cy="163" r="11" fill="#25d366"/>
          <defs>
            <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#4c1d95"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="wa-bubble">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.556 4.123 1.528 5.855L.057 23.882l6.204-1.448A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.823 9.823 0 0 1-5.012-1.374l-.36-.214-3.681.859.898-3.566-.235-.375A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
      </div>
    </div>

    <div class="text-wrap">
      <div class="brand">
        <span class="typed-1">WebBot</span><span class="typed-2">Maroc</span>
      </div>
      <p class="slogan">Sites web <span>+</span> Chatbots WhatsApp pour <span>avocats &amp; notaires</span></p>
    </div>
  </div>

<script>
  // Génère des particules flottantes aléatoires
  (function(){
    const banner = document.getElementById('banner');
    const count = 22;
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'particle' + (Math.random() < 0.28 ? ' green' : '');
      const size = 3 + Math.random()*6;
      p.style.width = size+'px';
      p.style.height = size+'px';
      p.style.left = Math.random()*820 + 'px';
      p.style.setProperty('--drift', (Math.random()*60-30)+'px');
      const duration = 9 + Math.random()*10;
      p.style.animationDuration = duration+'s';
      p.style.animationDelay = (Math.random()*duration*-1)+'s';
      banner.appendChild(p);
    }
  })();
</script>
</body>
</html>
