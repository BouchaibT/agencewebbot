<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démarrer mon site — Agence WebBot</title>
  <meta name="description" content="Formulaire d'onboarding express Agence WebBot : votre site vitrine livré rapidement.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bleu:#0a5c8a; --bleu-d:#074463; --bleu-pale:#eaf3f8; --vert:#1aa260; --texte:#1a2734; --gris:#6b7a89; --bord:#dce5ec; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;color:var(--texte);background:linear-gradient(135deg,#eaf3f8,#f7fafc);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;max-width:560px;width:100%;border-radius:18px;box-shadow:0 12px 50px rgba(10,92,138,.15);overflow:hidden}
    .head{background:linear-gradient(135deg,var(--bleu),var(--bleu-d));color:#fff;padding:32px 32px 26px}
    .logo{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.18);font-weight:700;font-size:1.4rem;margin-bottom:14px}
    .head h1{font-size:1.5rem;font-weight:600;line-height:1.25}
    .head p{opacity:.9;font-size:.92rem;margin-top:8px}
    form{padding:28px 32px 32px}
    .field{margin-bottom:20px}
    label{display:block;font-weight:500;font-size:.9rem;margin-bottom:7px}
    label .req{color:#e23b3b}
    input,select{width:100%;padding:12px 14px;border:1.5px solid var(--bord);border-radius:10px;font-family:inherit;font-size:.95rem;color:var(--texte);transition:border .2s}
    input:focus,select:focus{outline:none;border-color:var(--bleu)}
    .formules{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .formule{position:relative}
    .formule input{position:absolute;opacity:0;inset:0;cursor:pointer}
    .formule span{display:block;text-align:center;border:1.5px solid var(--bord);border-radius:10px;padding:14px 6px;cursor:pointer;transition:all .15s}
    .formule b{display:block;font-size:.95rem}
    .formule small{color:var(--gris);font-size:.78rem}
    .formule input:checked + span{border-color:var(--bleu);background:var(--bleu-pale);box-shadow:0 0 0 2px rgba(10,92,138,.15)}
    button{width:100%;background:var(--bleu);color:#fff;border:none;padding:15px;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
    button:hover{background:var(--bleu-d)}
    button:disabled{opacity:.6;cursor:default}
    .note{font-size:.78rem;color:var(--gris);text-align:center;margin-top:14px}
    .msg{display:none;padding:16px;border-radius:10px;margin-bottom:18px;font-size:.92rem}
    .msg.ok{display:block;background:#e7f7ee;color:#0e7a45;border:1px solid #b9e7cd}
    .msg.err{display:block;background:#fdecec;color:#c0392b;border:1px solid #f5c6c6}
    @media(max-width:460px){.formules{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">W</div>
      <h1>Démarrons votre site 🚀</h1>
      <p>Remplissez ce formulaire : votre dossier est créé et votre site généré automatiquement.</p>
    </div>
    <form id="f">
      <div id="msg" class="msg"></div>

      <div class="field">
        <label>Nom du client / entreprise <span class="req">*</span></label>
        <input type="text" name="nom_client" required placeholder="Ex : Cabinet Alami">
      </div>

      <div class="field">
        <label>Secteur d'activité <span class="req">*</span></label>
        <select name="secteur" required>
          <option value="">— Choisir —</option>
          <option value="avocat">Avocat / Notaire</option>
          <option value="medecin">Médecin / Cabinet médical</option>
          <option value="comptable">Comptable / Fiduciaire</option>
          <option value="dentiste">Dentiste</option>
          <option value="pharmacie">Pharmacie</option>
          <option value="architecte">Architecte</option>
          <option value="immobilier">Immobilier</option>
          <option value="restaurant">Restaurant / Café</option>
          <option value="artisan">Artisan / BTP</option>
          <option value="salon_beaute">Salon / Beauté</option>
          <option value="coach">Coach / Formation</option>
          <option value="autre">Autre</option>
        </select>
      </div>

      <div class="field">
        <label>Téléphone WhatsApp <span class="req">*</span></label>
        <input type="tel" name="telephone" required placeholder="06 00 00 00 00">
      </div>

      <div class="field">
        <label>Formule <span class="req">*</span></label>
        <div class="formules">
          <div class="formule">
            <input type="radio" name="formule" value="Essentiel 700" required>
            <span><b>Essentiel</b><small>700 DH/mois</small></span>
          </div>
          <div class="formule">
            <input type="radio" name="formule" value="Standard 1000">
            <span><b>Standard</b><small>1000 DH/mois</small></span>
          </div>
          <div class="formule">
            <input type="radio" name="formule" value="Premium 1500">
            <span><b>Premium</b><small>1500 DH/mois</small></span>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Domaine souhaité</label>
        <input type="text" name="domaine_souhaite" placeholder="Ex : cabinet-alami.ma">
      </div>

      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input type="email" name="email" required placeholder="contact@exemple.com">
      </div>

      <button type="submit" id="btn">Créer mon site</button>
      <p class="note">Agence WebBot — sites & chatbots WhatsApp au Maroc</p>
    </form>
  </div>

  <script>
    const WEBHOOK = "https://n8n.agencewebbot.com/webhook/onboarding-github";
    const form = document.getElementById('f');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg'; msg.textContent = '';
      btn.disabled = true; btn.textContent = 'Envoi en cours…';
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const r = await fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        msg.className = 'msg ok';
        msg.textContent = '✅ Merci ' + data.nom_client + ' ! Votre dossier est créé et votre site est en cours de génération. Nous vous recontactons très vite.';
        form.reset();
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = '❌ Une erreur est survenue. Réessayez ou contactez-nous à contact@agencewebbot.com.';
      } finally {
        btn.disabled = false; btn.textContent = 'Créer mon site';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  </script>
</body>
</html>
